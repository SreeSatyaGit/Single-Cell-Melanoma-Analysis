seed: 0

data:
  normalize_to_t0: true
  log_transform: false

fit:
  n_models: 5
  solver: BDF
  use_correction_term: false
  correction_width: 8
  l2_correction: 0.001
  l2_params: 0.0001
  fit_param_names:
    - k_craf_act
    - k_mek_act
    - k_erk_act
    - k_akt_act
    - IC50_vem
    - n_vem
    - alpha_vem
    - IC50_tram
    - n_tram

fixed_params:
  IC50_pi3k: 0.5 # user should edit
  n_pi3k: 2.0
  IC50_panras: 0.5 # user should edit
  n_panras: 2.0

prediction:
  time_min: 0
  time_max: 180
  n_timepoints: 120
  solver: BDF
  readouts:
    - pERK
    - pMEK
    - pAKT
    - pS6
  schedules:
    vem_doses: [1.0]
    pi3k_doses: [0.1, 0.3, 1.0]
    panras_doses: [0.1, 0.3, 1.0]
